name: Webapp CI

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - 'webapp/**'
      - '.github/workflows/webapp-ci.yml'

permissions:
  contents: read

concurrency:
  group: webapp-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: webapp

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:ci

      - name: Production build
        run: npm run build
