name: Webapp CI

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - 'webapp/**'
      - '.github/workflows/webapp-ci.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: webapp-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: webapp

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:ci

      - name: Production build
        run: npm run build

  deploy-pages:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: pages-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Default base is `/` so a custom domain served at the site root resolves JS/CSS
      # correctly. For the default `https://<user>.github.io/<repo>/` project URL, set
      # repository variable NG_PAGES_BASE_HREF=/<repo>/ in Actions settings.
      - name: Set Pages base href
        id: base
        run: |
          BASE='${{ vars.NG_PAGES_BASE_HREF }}'
          if [ -z "$BASE" ]; then
            BASE="/"
          fi
          echo "base_href=$BASE" >> "$GITHUB_OUTPUT"

      - name: Configure GoatCounter for production build (optional)
        env:
          GC_CODE: ${{ secrets.GOATCOUNTER_SITE_CODE }}
        run: |
          if [ -n "$GC_CODE" ]; then
            sed -i 's/enabled: false/enabled: true/' src/environments/environment.prod.ts
            sed -i "s|siteCode: ''|siteCode: '$GC_CODE'|" src/environments/environment.prod.ts
          fi

      - name: Build for GitHub Pages
        run: npm run build -- --base-href="${{ steps.base.outputs.base_href }}"

      - name: SPA fallback for GitHub Pages
        run: cp dist/webapp/index.html dist/webapp/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: webapp/dist/webapp

  deploy:
    runs-on: ubuntu-latest
    needs: deploy-pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: pages-${{ github.repository }}
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
