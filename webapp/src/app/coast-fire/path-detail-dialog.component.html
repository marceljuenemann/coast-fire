<h2 mat-dialog-title>Paths for {{ data.horizonYears }} year horizon</h2>

<mat-dialog-content class="path-detail-content">
  <p class="meta">{{ data.results.length }} historic starting points (all months, min. start year 1900).</p>
  <div class="chart-wrap mat-elevation-z1">
    <div
      echarts
      class="paths-chart"
      [options]="chartOption"
      [initOpts]="{ renderer: 'canvas' }"
    ></div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close type="button">Close</button>
</mat-dialog-actions>
