<div class="overview" *ngIf="horizons?.length">
  <h3 class="title">Overview</h3>
  <p class="sub">Probability of reaching your FIRE number by horizon; click a bar for path details.</p>
  <div class="chart-wrap mat-elevation-z1">
    <div
      echarts
      class="horizon-bar-chart"
      [options]="chartOption"
      [initOpts]="{ renderer: 'canvas' }"
      (chartClick)="onChartClick($event)"
    ></div>
  </div>
</div>
