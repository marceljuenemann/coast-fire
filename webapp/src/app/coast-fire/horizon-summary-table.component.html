<div class="summary" *ngIf="visibleRows.length">
  <h3>Chance to reach your FIRE number within …</h3>
  <p class="sub">Each row uses historic US returns (Shiller); click a row for every starting month and year.</p>

  <table mat-table [dataSource]="visibleRows" class="horizon-table">
    <ng-container matColumnDef="years">
      <th mat-header-cell *matHeaderCellDef>Horizon</th>
      <td mat-cell *matCellDef="let row">{{ row.horizonYears }} years</td>
    </ng-container>
    <ng-container matColumnDef="probability">
      <th mat-header-cell *matHeaderCellDef>Probability</th>
      <td mat-cell *matCellDef="let row">
        <span class="prob">{{ row.probability | percent : '1.0-1' }}</span>
        <span class="bar-wrap" aria-hidden="true">
          <span class="bar" [style.width.%]="row.probability * 100"></span>
        </span>
      </td>
    </ng-container>
    <ng-container matColumnDef="counts">
      <th mat-header-cell *matHeaderCellDef>Success / paths</th>
      <td mat-cell *matCellDef="let row">{{ row.successes }} / {{ row.totalRuns }}</td>
    </ng-container>
    <ng-container matColumnDef="hint">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row"><span class="chevron">Details</span></td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"
      class="click-row"
      (click)="selectRow(row)"
      (keyup.enter)="selectRow(row)"
      (keydown.space)="$event.preventDefault(); selectRow(row)"
      tabindex="0"
      role="button"
    ></tr>
  </table>
</div>
